name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (linux musl via cross)
        if: runner.os == 'Linux'
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true

      - name: Build (macOS native)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          case "${{ matrix.target }}" in
            *-linux-musl) suffix=${{ matrix.target }};;
            *-apple-darwin) suffix=aarch64-darwin;;
          esac
          tar -czf "skipjackd-${suffix}.tar.gz" -C target/${{ matrix.target }}/release skipjackd
          echo "suffix=${suffix}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: skipjackd-${{ env.suffix }}
          path: skipjackd-${{ env.suffix }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
