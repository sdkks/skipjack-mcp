# skipjackd reference configuration
# ===================================
# This file documents every configuration option with its default value.
# Copy this file to ~/.config/skipjackd/config.toml and customize.
# Environment variables with the SKIPJACKD_ prefix override these values:
#   SKIPJACKD_CACHE__DEFAULT_TTL_SECS=7200 -> cache.default_ttl_secs = 7200

# --- Daemon settings ----------------------------------------------------
[daemon]
name = "skipjackd"
socket_dir = "/tmp"
pid_dir = "/tmp"
shutdown_grace_period_secs = 30
log_level = "info"              # trace, debug, info, warn, error
log_file = ""                   # empty = stdout

# --- Cache settings -----------------------------------------------------
[cache]
db_path = "~/.cache/skipjackd/cache.db"
default_ttl_secs = 3600
eviction_interval_secs = 300

# --- Search defaults ----------------------------------------------------
[search]
default_limit = 10
max_limit = 100
request_timeout_secs = 60

# --- Dispatch mode ------------------------------------------------------
[dispatch]
mode = "concurrent"             # "concurrent" or "tiered"

# --- Anti-blocking settings ---------------------------------------------
[anti_blocking]
user_agents = [
