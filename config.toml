]
page_delay_min_ms = 500
page_delay_max_ms = 2000
retry_base_delay_secs = 1
retry_max_attempts = 3
retry_cap_secs = 60

# --- Ranking weights ----------------------------------------------------
[ranking.provider_reputation]
enabled = false
weight = 1.0

[ranking.result_position]
enabled = true
weight = 1.0

[ranking.freshness_bonus]
enabled = false
weight = 0.0
window_days = 7


# --- Provider entries ---------------------------------------------------
# Each [[providers]] table configures one search provider.
# Required fields: name, enabled
# Optional: api_key, api_key_env, base_url, timeout_secs, weight,
#           cache_ttl_secs, tls_shuffle_ciphers, ip_rotation_strategy,
#           ipv6_subnet, proxies, rate_limit_rpm, retry_max_attempts, tags

[[providers]]
name = "duckduckgo"
enabled = true
tls_shuffle_ciphers = true
ip_rotation_strategy = "static"
rate_limit_rpm = 30
retry_max_attempts = 2
tags = ["web", "privacy"]

[[providers]]
name = "jina"
enabled = true
api_key_env = "JINA_API_KEY"
base_url = "https://s.jina.ai"
timeout_secs = 15
ip_rotation_strategy = "ipv6_pool"
ipv6_subnet = "2001:db8::/64"
rate_limit_rpm = 100
tags = ["web"]

[[providers]]
name = "brave"
enabled = true
api_key_env = "BRAVE_API_KEY"
rate_limit_rpm = 20
retry_max_attempts = 3
tags = ["web"]
weight = 1.2

[[providers]]
name = "searxng"
enabled = true
# Set to your SearXNG instance URL (HTTP or HTTPS):
# base_url = "http://localhost:8080"
# base_url = "https://search.example.com"
rate_limit_rpm = 20
tags = ["web", "privacy"]

# --- Tier ladder (for tiered dispatch mode) -----------------------------
[tiers]
order = [0, 1, 2, 3]

[tiers.0]
providers = ["duckduckgo"]
timeout_secs = 10

[tiers.1]
providers = ["jina"]
timeout_secs = 15

[tiers.2]
providers = ["brave"]
timeout_secs = 15

[tiers.3]
providers = ["searxng"]
timeout_secs = 20
